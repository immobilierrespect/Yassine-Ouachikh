<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immobilier Respect - تابعنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            color: white;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .social-btn i {
            font-size: 28px;
            margin-left: 15px;
        }

        .social-btn span {
            flex: 1;
            text-align: right;
        }

        .tiktok { background: linear-gradient(135deg, #000000, #333333); }
        .youtube { background: linear-gradient(135deg, #FF0000, #cc0000); }
        .instagram { background: linear-gradient(135deg, #E4405F, #F77737, #FCAF45); }
        .facebook { background: linear-gradient(135deg, #1877F2, #0d5cb6); }

        .qr-section {
            background: #f7fafc;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .qr-section h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .qr-code img {
            width: 100%;
            height: 100%;
        }

        .footer {
            margin-top: 25px;
            color: #a0aec0;
            font-size: 14px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInUp 0.8s ease;
        }

        .social-btn {
            animation: fadeInUp 0.6s ease backwards;
        }

        .social-btn:nth-child(1) { animation-delay: 0.1s; }
        .social-btn:nth-child(2) { animation-delay: 0.2s; }
        .social-btn:nth-child(3) { animation-delay: 0.3s; }
        .social-btn:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img">
            <i class="fas fa-home"></i>
        </div>

        <h1>Immobilier Respect</h1>
        <p class="subtitle">وكالة عقارية موثوقة - تابعنا على وسائل التواصل</p>

        <div class="social-links">
            <a href="https://www.tiktok.com/@immobilier.respect" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
                <i class="fas fa-external-link-alt" style="font-size: 16px;"></i>
            </a>

            <a href="https://youtube.com/@immobilierrespect" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
                <i class="fas fa-external-link-alt" style="font-size: 16px;"></i>
            </a>

            <a href="https://www.instagram.com/agence_immobilier_rspeect" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-external-link-alt" style="font-size: 16px;"></i>
            </a>

            <a href="https://www.facebook.com/share/1PUg4CZB88/?mibextid=wwXIfr" target="_blank" class="social-btn facebook">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
                <i class="fas fa-external-link-alt" style="font-size: 16px;"></i>
            </a>
        </div>

        <div class="qr-section">
            <h3>📱 امسح للمشاركة</h3>
            <div class="qr-code">
                <img src="qr_main_landing.png" alt="QR Code">
            </div>
        </div>

        <div class="footer">
            © 2024 Immobilier Respect - جميع الحقوق محفوظة
        </div>
    </div>
</body>
</html>
